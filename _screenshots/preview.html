<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Lsprint 截图预览</title>
<style>
  body { font-family: system-ui; padding: 24px; background: #f0f0f0; }
  h1 { font-size: 18px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 24px; max-width: 800px; }
  .item { background: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .item img { width: 100%; height: auto; display: block; border: 1px solid #ddd; }
  .item h2 { margin: 0 0 12px; font-size: 14px; }
</style>
</head>
<body>
  <h1>Lsprint 截图预览（1920×1080）</h1>
  <p>若有画面，说明截图正常；若为黑/白，说明需调整。</p>
  <div class="grid">
    <div class="item"><h2>01 登录页</h2><img src="login.png" alt="login"></div>
    <div class="item"><h2>02 计划页</h2><img src="sprint.png" alt="sprint"></div>
    <div class="item"><h2>03 笔记页</h2><img src="notes.png" alt="notes"></div>
    <div class="item"><h2>04 新闻页</h2><img src="signals.png" alt="signals"></div>
  </div>
</body>
</html>
